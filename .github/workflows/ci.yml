name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip pre-commit
          npm install --global --no-progress prettier@3.8.1

      - name: Lint with pre-commit
        run: pre-commit run --all-files

      - name: Validate post front matter
        run: ./scripts/validate-frontmatter.sh

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.157.0"

      - name: Build site
        run: hugo --minify

      - name: Validate output
        run: |
          test -f public/index.html || { echo "index.html missing"; exit 1; }
          test -f public/sitemap.xml || { echo "sitemap.xml missing"; exit 1; }
          echo "Build validation passed"
