name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Run lint checks
        run: make lint

      - name: Run build checks
        run: make test

      - name: Validate content front matter
        run: make test-content
