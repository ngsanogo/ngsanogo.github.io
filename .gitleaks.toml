title = "gitleaks config"

[allowlist]
description = "Allow fake credentials used in educational markdown code snippets"
regexes = [
  '''aws_secret_access_key\s*=\s*"minioadmin"''',
  '''password\s*=\s*"secret"'''
]
paths = [
  '''content/posts/minio-airflow-data-lake\.md''',
  '''content/posts/python-for-data-engineering\.md'''
]
