baseURL = "https://ngsanogo.github.io/"
languageCode = "fr"
defaultContentLanguage = "fr"
title = "Issa Sanogo"
buildFuture = false
disableKinds = ["taxonomy", "term"]

[pagination]
  pagerSize = 999

[permalinks]
  [permalinks.page]
    posts = "/posts/:slug/"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = true
    style = "github-dark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[params]
  description = "Data engineer et passionné de data."
  author = "Issa Sanogo"
  linkedin = "https://www.linkedin.com/in/ngsanogo/"
  github = "https://github.com/ngsanogo"

[[menus.main]]
  name = "Accueil"
  url = "/"
  weight = 1

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 2
