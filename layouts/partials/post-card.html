{{- $p := .page -}}
<div class="post-item">
    <h2 class="post-title"><a href="{{ $p.RelPermalink }}">{{ $p.Title }}</a></h2>
    <p class="post-meta">
        <time datetime="{{ $p.Date.Format "2006-01-02" }}">{{ partial "date-fr.html" $p.Date }}</time>
    </p>
    {{ with $p.Description }}<p class="post-description">{{ . }}</p>{{ end }}
</div>
