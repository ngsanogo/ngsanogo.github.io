services:
  dev:
    build:
      context: .
      target: hugo
    command: hugo server --bind 0.0.0.0 --port 1313 --poll 1s
    ports:
      - "1313:1313"
    volumes:
      - .:/site
    profiles: ["dev"]
    labels:
      - "com.ngsanogo.service=dev"

  build:
    build:
      context: .
      target: hugo
    command: hugo --minify --cleanDestinationDir
    volumes:
      - .:/site
    profiles: ["build"]
    labels:
      - "com.ngsanogo.service=build"

  test:
    build:
      context: .
      target: hugo
    command: sh -c "hugo --minify --cleanDestinationDir && test -f public/index.html && test -f public/sitemap.xml && echo 'All checks passed'"
    volumes:
      - .:/site
    profiles: ["test"]
    labels:
      - "com.ngsanogo.service=test"

  lint:
    build:
      context: .
      target: lint
    command: sh -c "git config --global --add safe.directory /site && pre-commit run --all-files"
    volumes:
      - .:/site
      - precommit-cache:/root/.cache/pre-commit
      - .git:/site/.git
    profiles: ["lint"]
    labels:
      - "com.ngsanogo.service=lint"

volumes:
  precommit-cache:
