{{ define "main" }}
<article>
    <header class="article-header">
        <p class="eyebrow">Note</p>
        <h1 class="page-title">{{ .Title }}</h1>
        <p class="post-meta">
            <time datetime="{{ .Date.Format "2006-01-02" }}">{{ partial "date-fr.html" .Date }}</time>
        </p>
    </header>
    {{ .Content }}
    <footer class="article-footer">
        <a href="/notes/" class="button-secondary">Retour aux notes</a>
    </footer>
</article>
{{ $js := resources.Get "js/copy-code.js" | minify | fingerprint }}
<script defer src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}"></script>
{{ end }}
