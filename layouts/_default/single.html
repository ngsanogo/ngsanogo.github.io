{{ define "main" }}
{{ $isPost := eq .Section "posts" }}
<article>
    <header class="article-header">
        <h1 class="page-title">{{ .Title }}</h1>
        {{ if $isPost }}
        {{ partial "post-meta.html" (dict "page" . "showTaxonomies" true) }}
        {{ end }}
    </header>
    {{ .Content }}
    {{ with .Params.cta }}
    <footer class="article-footer">
        {{ range . }}
        <a href="{{ .url }}" class="button-{{ .style }}">{{ .label }}</a>
        {{ end }}
    </footer>
    {{ end }}
</article>
{{ end }}
