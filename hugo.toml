baseURL = "https://ngsanogo.github.io/"
languageCode = "fr"
defaultContentLanguage = "fr"
title = "Issa Sanogo"
buildFuture = false

[taxonomies]
  tag = "tags"
  category = "categories"

[pagination]
  pagerSize = 10

[permalinks]
  [permalinks.page]
    posts = "/posts/:slug/"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = true
    style = "github-dark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "Senior Data Engineer & PM a Paris. Architecture data, reprise de donnees, qualite et delivery produit sans boite noire."
  author = "Issa Sanogo"
  role = "Senior Data Engineer & PM"
  jobTitle = "Data Engineer Freelance Paris"
  location = "Paris, Île-de-France, France"
  email = "ngsanogo@proton.me"
  linkedin = "https://www.linkedin.com/in/ngsanogo/"
  github = "https://github.com/ngsanogo"

[[menus.main]]
  name = "Accueil"
  url = "/"
  weight = 1

[[menus.main]]
  name = "Articles"
  url = "/blog/"
  weight = 2

[[menus.main]]
  name = "CV"
  url = "/cv/"
  weight = 3

[[menus.main]]
  name = "Contact"
  url = "/contact/"
  weight = 4
  [menus.main.params]
    cta = true
