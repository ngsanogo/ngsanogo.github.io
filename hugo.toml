baseURL = "https://ngsanogo.github.io/"
languageCode = "fr"
defaultContentLanguage = "fr"
title = "Issa Sanogo"
buildFuture = false

[taxonomies]
  tag = "tags"
  category = "categories"

[pagination]
  pagerSize = 10

[permalinks]
  [permalinks.page]
    posts = "/posts/:slug/"
    notes = "/notes/:slug/"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = true
    style = "github-dark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[params]
  description = "Notes et réflexions d'un data engineer qui préfère les pipelines lisibles aux architectures brillantes."
  author = "Issa Sanogo"
  email = "ngsanogo@proton.me"
  linkedin = "https://www.linkedin.com/in/ngsanogo/"
  github = "https://github.com/ngsanogo"

[[menus.main]]
  name = "Articles"
  url = "/blog/"
  weight = 1

[[menus.main]]
  name = "Commencer ici"
  url = "/commencer/"
  weight = 2

[[menus.main]]
  name = "À propos"
  url = "/about/"
  weight = 3
