name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Validate Docker Compose config
        run: docker compose --profile dev --profile build --profile test --profile lint config > /dev/null

      - name: Run lint checks
        run: |
          docker build --target lint -t ngsanogo-site-lint .
          docker run --rm -v "$PWD:/site" -w /site ngsanogo-site-lint sh -c "git config --global --add safe.directory /site && pre-commit run --all-files"

      - name: Run build checks
        run: make test

      - name: Validate content front matter
        run: make test-content

      - name: Validate links
        run: make test-links

      - name: Scan secrets
        run: make test-secrets
