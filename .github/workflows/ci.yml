name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Setup Hugo
        run: |
          sudo apt-get update
          sudo apt-get install hugo
      - name: Run tests
        run: |
          make test
      - name: Run lint
        run: |
          make lint
      - name: Validate content
        run: |
          make test-content
      - name: Run unit tests
        run: |
          make test-unit
      - name: Run security scan
        run: |
          make test-secrets
