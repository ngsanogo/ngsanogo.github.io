{{ define "main" }}
<article>
    <header class="article-header">
        <h1 class="page-title">{{ .Title }}</h1>
        {{ partial "post-meta.html" (dict "page" . "showTaxonomies" true) }}
    </header>
    {{ .Content }}
    {{ partial "consulting-cta.html" . }}
    <footer class="article-footer">
        <a href="/blog/" class="button-secondary">← Tous les articles</a>
    </footer>
</article>
{{ end }}
