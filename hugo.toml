baseURL = "https://ngsanogo.github.io/"
languageCode = "fr"
defaultContentLanguage = "fr"
title = "Issa Sanogo"
buildFuture = false

[taxonomies]
  tag = "tags"
  category = "categories"

[pagination]
  pagerSize = 999

[permalinks]
  [permalinks.page]
    posts = "/posts/:slug/"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = true
    style = "github-dark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[params]
  description = "Data engineer. J'écris sur ce que j'apprends, ce que je construis et ce que je casse."
  author = "Issa Sanogo"
  email = "ngsanogo@proton.me"
  linkedin = "https://www.linkedin.com/in/ngsanogo/"
  github = "https://github.com/ngsanogo"

[[menus.main]]
  name = "Posts"
  url = "/posts/"
  weight = 1

[[menus.main]]
  name = "À propos"
  url = "/about/"
  weight = 2
